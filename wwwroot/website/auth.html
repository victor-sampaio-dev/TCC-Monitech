 
  MODAL DE AUTENTICAÇÃO - LOGIN E CADASTRO
  Este modal deve ser incluído em todos os arquivos HTML que usam o navbar
  Adicione as linhas abaixo após o </nav>:
  
  <link rel="stylesheet" href="./assets/css/shared/auth-modal.css">
  <script src="./assets/js/shared/auth-modal.js" defer  async></script>


<div class="auth-backdrop" id="auth-backdrop">
  <div class="auth-modal">
    <!-- Botão fechar -->
    <button class="auth-close-btn" onclick="closeAuthModal()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Header -->
    <div class="auth-header">
      <span class="auth-header-logo">MONITECH</span>
      <h2>Bem-vindo</h2>
      <p>Acesse sua conta profissional</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab" data-tab="login" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')">Cadastro</button>
    </div>

    <!-- Conteúdo: Login -->
    <div class="auth-content" id="auth-login">
      <!-- Login com Google -->
      <button class="auth-social-btn" id="google-login-btn" onclick="loginWithGoogle()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="google-divider"></span>
        Entrar com Google
      </button>

      <!-- Divisor -->
      <div class="auth-divider">ou</div>

      <!-- Formulário de Login -->
      <form class="auth-form" id="login-form" onsubmit="loginWithEmail(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="auth-submit-btn">Login</button>
      </form>

      <!-- Links de rodapé -->
      <div class="auth-footer">
        <a href="#" onclick="event.preventDefault(); alert('Recuperação de senha será implementada');"> Esqueceu a senha?</a>
      </div>
    </div>

    <!-- Conteúdo: Cadastro -->
    <div class="auth-content" id="auth-signup">
      <!-- Cadastro com Google -->
      <button class="auth-social-btn" id="google-signup-btn" onclick="signupWithGoogle()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="google-divider"></span>
        Cadastrar com Google
      </button>

      <!-- Divisor -->
      <div class="auth-divider">ou</div>

      <!-- Formulário de Cadastro -->
      <form class="auth-form" id="signup-form" onsubmit="signupWithEmail(event)">
        <div class="form-group">
          <label for="signup-name">Nome Completo</label>
          <input type="text" id="signup-name" placeholder="Seu nome" required>
        </div>

        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label for="signup-password">Senha</label>
          <input type="password" id="signup-password" placeholder="••••••••" required>
        </div>

        <div class="form-checkbox">
          <input type="checkbox" id="signup-terms" required>
          <label for="signup-terms">Concordo com os <a href="#" onclick="event.preventDefault();">Termos de Serviço</a></label>
        </div>

        <button type="submit" class="auth-submit-btn">Criar Conta</button>
      </form>

      <!-- Links de rodapé -->
      <div class="auth-footer">
        Já tem uma conta? <a href="#" onclick="switchAuthTab('login');">Faça login</a>
      </div>
    </div>
  </div>
</div>
